services:
  deckhand:
    image: ghcr.io/olvrvrmr/deckhand:latest
    container_name: deckhand
    restart: unless-stopped
    environment:
      - BACKUP_CRON=0 2 * * *
      - BACKUP_DESTINATION=user@nas:/mnt/backups/docker
      - BACKUP_SSH_KEY=/keys/id_rsa
      - BACKUP_DRY_RUN=false
      - BACKUP_NOTIFY_URL=https://n8n.example.com/webhook/backup  # optional
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/.ssh/id_rsa:/keys/id_rsa:ro

  # Example: stop container during backup
  myapp:
    image: myapp:latest
    labels:
      - "deckhand.enable=true"
      - "deckhand.stop=true"
      - "deckhand.path=/opt/appdata/myapp"
      - "deckhand.exclude=logs,*.tmp"
      - "deckhand.priority=10"

  # Example: multi-container app (app + postgres)
  # Only the DB gets deckhand.path — app is stopped first via priority
  myapp-postgres:
    image: postgres:16-alpine
    labels:
      - "deckhand.enable=true"
      - "deckhand.stop=true"
      - "deckhand.path=/opt/appdata/myapp"  # backs up postgres + app data
      - "deckhand.priority=10"              # stopped after myapp-server

  myapp-server:
    image: myapp:latest
    labels:
      - "deckhand.enable=true"
      - "deckhand.stop=true"
      - "deckhand.priority=5"   # stopped first, no path needed

  # Example: live backup with pre-exec hook
  myapp-sqlite:
    image: myapp:latest
    labels:
      - "deckhand.enable=true"
      - "deckhand.stop=false"
      - "deckhand.pre-exec=sqlite3 /data/app.db '.backup /data/app.db.bak'"
      - "deckhand.path=/opt/appdata/myapp-sqlite"
